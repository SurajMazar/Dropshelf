name: DropShelf
options:
  bundleIdPrefix: com.surajthapa
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  DropShelf:
    type: application
    platform: macOS
    sources:
      - path: DropShelf
        excludes:
          - "Info.plist"
          - "DropShelf.entitlements"
    resources:
      - DropShelf/Assets.xcassets
    info:
      path: DropShelf/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: DropShelf
        CFBundleDisplayName: DropShelf
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Suraj Thapa"
        NSAppleEventsUsageDescription: "DropShelf needs AppleEvents for file operations."
        NSHighResolutionCapable: true
    entitlements:
      path: DropShelf/DropShelf.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.surajthapa.DropShelf
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: KeyboardShortcuts
